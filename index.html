<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>NicksCuteShooterGame</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <canvas id="gameCanvas" width="480" height="720"></canvas>

  <div id="scoreOverlay" style="display:none; position:fixed; inset:0; align-items:center; justify-content:center; background:rgba(0,0,0,0.78); z-index:100">
    <div id="scoreBox">
      <p id="scoreMsg"></p>
      <p id="scoreVal"></p>
      <input type="text" id="playerNameInput" maxlength="20" placeholder="Enter your name..." autocomplete="off" />
      <button id="submitScoreBtn">SUBMIT ★</button>
    </div>
  </div>

  <script src="js/constants.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/input.js"></script>
  <script src="js/renderer.js"></script>
  <script src="js/entities.js"></script>
  <script src="js/levels.js"></script>
  <script src="js/screens.js"></script>
  <script src="js/game.js"></script>
</body>
</html>
