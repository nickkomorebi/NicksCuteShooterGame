server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Proxy API requests to the scores service
    location /api/ {
        proxy_pass http://scores:3000/api/;
        proxy_set_header Host $host;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Tell browsers and Cloudflare not to cache game files
    location ~* \.(html|js|css)$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        expires 0;
    }
}
