services:
  web:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - .:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - scores
    restart: unless-stopped

  scores:
    build: ./server
    volumes:
      - ./server/data:/app/data
    restart: unless-stopped
